<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish Your API - API Showcase</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <main class="main">
            <section class="hero">
                <h1 class="hero-title">
                    <svg class="hero-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Publish Your API
                </h1>
                <p class="hero-subtitle">Share your API with the community</p>
            </section>

            <form class="publish-form" id="publishForm" novalidate>
                <div class="form-group">
                    <label for="apiName">API Name</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="apiName" 
                            name="apiName" 
                            placeholder="e.g., Weather API"
                            maxlength="100"
                            required
                            autocomplete="off"
                        >
                    </div>
                    <span class="form-error" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="apiDescription">Description</label>
                    <div class="input-wrapper">
                        <textarea 
                            id="apiDescription" 
                            name="apiDescription" 
                            placeholder="Describe what your API does..."
                            rows="4"
                            maxlength="500"
                            required
                        ></textarea>
                        <span class="char-count"><span id="descCount">0</span>/500</span>
                    </div>
                    <span class="form-error" id="descError"></span>
                </div>

                <div class="form-group">
                    <label for="apiImage">Image URL</label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="apiImage" 
                            name="apiImage" 
                            placeholder="https://i.imgur.com/example.jpg"
                            maxlength="500"
                            required
                            autocomplete="off"
                        >
                    </div>
                    <span class="form-hint">Use an image from Imgur, Unsplash, Picsum, or any image hosting service</span>
                    <span class="form-error" id="imageError"></span>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <div class="custom-select" id="categorySelect">
                        <div class="select-display">
                            <span class="select-value">Select a category</span>
                            <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                        </div>
                        <div class="select-options">
                            <div class="select-option" data-value="authentication">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="option-icon">
                                    <path d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z"/>
                                    <path d="M12 16v4"/>
                                    <path d="M12 12a4 4 0 0 1-4-4V6a4 4 0 0 1 8 0v2a4 4 0 0 1-4 4z"/>
                                </svg>
                                <span>Authentication</span>
                            </div>
                            <div class="select-option" data-value="data">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="option-icon">
                                    <line x1="12" y1="20" x2="12" y2="10"/>
                                    <line x1="18" y1="20" x2="18" y2="4"/>
                                    <line x1="6" y1="20" x2="6" y2="16"/>
                                </svg>
                                <span>Data & Analytics</span>
                            </div>
                            <div class="select-option" data-value="media">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="option-icon">
                                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                                </svg>
                                <span>Media & Content</span>
                            </div>
                        </div>
                        <input type="hidden" id="apiCategory" name="apiCategory" required>
                    </div>
                    <span class="form-error" id="categoryError"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="apiDate">Published Date</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="apiDate" 
                                name="apiDate"
                                placeholder="YYYY-MM-DD"
                                maxlength="10"
                                required
                                autocomplete="off"
                            >
                        </div>
                        <span class="form-error" id="dateError"></span>
                    </div>

                    <div class="form-group">
                        <label for="apiAuthor">Author/Team Name</label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="apiAuthor" 
                                name="apiAuthor" 
                                placeholder="Your name or team"
                                maxlength="50"
                                required
                                autocomplete="off"
                            >
                        </div>
                        <span class="form-error" id="authorError"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="apiEndpoint">API Endpoint <span class="optional">(optional)</span></label>
                    <div class="input-wrapper">
                        <input 
                            type="text" 
                            id="apiEndpoint" 
                            name="apiEndpoint" 
                            placeholder="/api/your-api"
                            maxlength="100"
                            autocomplete="off"
                        >
                    </div>
                    <span class="form-error" id="endpointError"></span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        <span>Publish API</span>
                    </button>
                    <a href="index.html" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="19" y1="12" x2="5" y2="12"/>
                            <polyline points="12 19 5 12 12 5"/>
                        </svg>
                        <span>Cancel</span>
                    </a>
                </div>

                <div class="form-status" id="formStatus"></div>
            </form>

            <div class="back-link">
                <a href="index.html">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                    Back to Home
                </a>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
