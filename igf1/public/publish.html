<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish - API Showcase</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-content">
                <a href="/" class="logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                    </svg>
                    <span>API Showcase</span>
                </a>
                <nav class="nav">
                    <a href="/" class="nav-link">Explore</a>
                    <a href="/search" class="nav-link">Search</a>
                    <a href="/profile" class="nav-link">My APIs</a>
                    <a href="/publish" class="nav-link nav-link-primary">Publish API</a>
                </nav>
            </div>
        </header>

        <main class="main">
            <section class="hero">
                <h1 class="hero-title">Publish API</h1>
                <p class="hero-subtitle">Share your API with the world</p>
            </section>

            <div class="progress-steps">
                <div class="step active" data-step="1">
                    <span class="step-number">1</span>
                </div>
                <div class="step" data-step="2">
                    <span class="step-number">2</span>
                </div>
                <div class="step" data-step="3">
                    <span class="step-number">3</span>
                </div>
            </div>

            <form class="publish-form" id="publishForm" novalidate>
                <div class="form-step active" data-step="1">
                    <div class="form-group">
                        <label for="apiName">API Name</label>
                        <input type="text" id="apiName" placeholder="e.g., Weather API" maxlength="100" required>
                        <span class="form-error" id="nameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="apiDescription">Description</label>
                        <textarea id="apiDescription" placeholder="Describe your API..." rows="2" maxlength="500" required></textarea>
                        <span class="char-count"><span id="descCount">0</span>/500</span>
                        <span class="form-error" id="descError"></span>
                    </div>
                </div>

                <div class="form-step" data-step="2">
                    <div class="form-group">
                        <label for="apiImage">Image URL</label>
                        <input type="text" id="apiImage" placeholder="https://i.imgur.com/example.jpg" maxlength="500" required>
                        <span class="form-hint">Use Imgur, Unsplash, Picsum, and more</span>
                        <span class="form-error" id="imageError"></span>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <div class="custom-select" id="categorySelect">
                            <div class="select-display">
                                <span class="select-value">Select a category</span>
                                <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="6 9 12 15 18 9"/>
                                </svg>
                            </div>
                            <div class="select-options">
                                <div class="select-option" data-value="authentication">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 11H5a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7a2 2 0 0 0-2-2z"/><path d="M12 16v4"/><path d="M12 12a4 4 0 0 1-4-4V6a4 4 0 0 1 8 0v2a4 4 0 0 1-4 4z"/></svg>
                                    <span>Authentication</span>
                                </div>
                                <div class="select-option" data-value="data">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
                                    <span>Data & Analytics</span>
                                </div>
                                <div class="select-option" data-value="media">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
                                    <span>Media & Content</span>
                                </div>
                                <div class="select-option" data-value="communication">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                    <span>Communication</span>
                                </div>
                                <div class="select-option" data-value="payment">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                                    <span>Payment</span>
                                </div>
                                <div class="select-option" data-value="ai">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1v-1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                                    <span>AI & Machine Learning</span>
                                </div>
                            </div>
                            <input type="hidden" id="apiCategory" name="apiCategory" required>
                        </div>
                        <span class="form-error" id="categoryError"></span>
                    </div>
                </div>

                <div class="form-step" data-step="3">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="apiDate">Date</label>
                            <input type="text" id="apiDate" placeholder="YYYY-MM-DD" maxlength="10" required>
                            <span class="form-error" id="dateError"></span>
                        </div>
                        <div class="form-group">
                            <label for="apiAuthor">Author</label>
                            <input type="text" id="apiAuthor" placeholder="Your name" maxlength="50" required>
                            <span class="form-error" id="authorError"></span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="apiEndpoint">Endpoint <span class="optional">(optional)</span></label>
                        <input type="text" id="apiEndpoint" placeholder="/api/your-api" maxlength="100">
                        <span class="form-error" id="endpointError"></span>
                    </div>
                    <div class="form-group">
                        <label for="apiWebsite">Website <span class="optional">(optional)</span></label>
                        <input type="url" id="apiWebsite" placeholder="https://example.com" maxlength="200">
                        <span class="form-error" id="websiteError"></span>
                    </div>
                </div>

                <div class="form-navigation">
                    <button type="button" class="btn btn-secondary" id="prevBtn" style="display: none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                        <span>Back</span>
                    </button>
                    <button type="button" class="btn btn-primary" id="nextBtn">
                        <span>Next</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                    </button>
                    <button type="submit" class="btn btn-primary" id="submitBtn" style="display: none;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                        <span>Publish</span>
                    </button>
                </div>
            </form>
        </main>

        <footer class="footer">
            <p>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                Built with care
            </p>
        </footer>
    </div>

    <div class="modal-overlay" id="publishModal">
        <div class="modal">
            <div class="modal-spinner" id="modalSpinner">
                <div class="spinner spinner-lg"></div>
                <p>Publishing...</p>
            </div>
            <div class="modal-content" id="modalContent" style="display: none;">
                <div class="modal-icon" id="modalIcon"></div>
                <h3 class="modal-title" id="modalTitle"></h3>
                <p class="modal-message" id="modalMessage"></p>
                <button class="btn btn-primary" id="modalClose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                    <span>Close</span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
